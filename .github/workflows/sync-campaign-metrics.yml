name: Sync Campaign Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update metrics from Tally
        env:
          TALLY_API_KEY: ${{ secrets.TALLY_API_KEY }}
          TALLY_FORM_ID: ${{ secrets.TALLY_FORM_ID }}
          CAMPAIGN_MUNICIPALITIES: ${{ vars.CAMPAIGN_MUNICIPALITIES }}
          CAMPAIGN_ORGANIZATIONS: ${{ vars.CAMPAIGN_ORGANIZATIONS }}
        run: node scripts/update-metrics.mjs

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/campaign-metrics.json
          git commit -m "chore: sync campaign metrics from Tally"
          git push
