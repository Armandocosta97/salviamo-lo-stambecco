<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirect | Salviamo lo Stambecco</title>
    <script>
      (function () {
        var segmentCount = 1;
        var location = window.location;
        var l = location.pathname.split('/').slice(1);
        var repo = l.slice(0, segmentCount).join('/');
        var route = l.slice(segmentCount).join('/');
        var target =
          location.protocol +
          '//' +
          location.hostname +
          (location.port ? ':' + location.port : '') +
          '/' +
          repo +
          '/#/' +
          route +
          (location.search || '') +
          (location.hash || '');

        window.location.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
